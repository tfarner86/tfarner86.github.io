<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Anime Search (Jikan API)</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">

</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
      <a class="navbar-brand" href="#">Anime Finder</a>
      <span class="navbar-text">Search anime titles via the Jikan API</span>
    </div>
  </nav>

  <main class="container">
    <section class="card p-4 mb-4">
      <h2 class="card-title">Search for Anime</h2>
      <form id="searchForm" class="row g-3" novalidate>
        <div class="col-md-8">
          <label for="query" class="form-label">Anime title</label>
          <input type="text" id="query" class="form-control" placeholder="e.g., Fullmetal Alchemist" required>
          <div id="queryFeedback" class="invalid-feedback"></div>
        </div>

        <div class="col-md-2 align-self-end">
          <label class="form-label d-block">&nbsp;</label>
          <button type="submit" id="searchBtn" class="btn btn-primary w-100">Search</button>
        </div>

        <div class="col-md-2 align-self-end">
          <label class="form-label d-block">&nbsp;</label>
          <button type="button" id="clearBtn" class="btn btn-outline-secondary w-100">Clear</button>
        </div>
      </form>
    </section>

    <section id="status" class="mb-3"></section>

    <section id="results" class="row g-3"></section>
  </main>

  <footer class="text-center py-4">
    <small>Data provided by <a href="https://jikan.moe" target="_blank" rel="noopener">Jikan (MyAnimeList)</a>
        <p>CST336 Internet Programming, &copy;2026 Farner | <a href="../tfarner86.github.io/index.html">Directory to Taylor's CST336 Projects</p></small>
    
  </footer>

  <script src="js/script.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

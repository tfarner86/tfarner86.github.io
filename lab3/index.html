<!DOCTYPE html>
<html>
<head>
    <title>Sign Up Page</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-sm p-4 mx-auto" style="max-width: 600px;">
        <h1 class="text-center mb-4">Sign Up</h1>

        <form id="signupForm" action="welcome.html" class="needs-validation">

            <!-- First Name -->
            <div class="mb-3">
                <label class="form-label">First Name</label>
                <input type="text" name="fName" class="form-control">
            </div>

            <!-- Last Name -->
            <div class="mb-3">
                <label class="form-label">Last Name</label>
                <input type="text" name="lName" class="form-control">
            </div>

            <!-- Gender -->
            <div class="mb-3">
                <label class="form-label d-block">Gender</label>
                <div class="form-check">
                    <input type="radio" name="gender" value="m" class="form-check-input">
                    <label class="form-check-label">Male</label>
                </div>
                <div class="form-check">
                    <input type="radio" name="gender" value="f" class="form-check-input">
                    <label class="form-check-label">Female</label>
                </div>
            </div>

            <!-- ZIP -->
            <div class="mb-3">
                <label class="form-label">Zip Code</label>
                <input type="text" id="zip" name="zip" class="form-control">
                <span id="zipError" class="text-danger small"></span>
            </div>

            <!-- City / Lat / Long -->
            <div class="mb-3">
                <label class="form-label">City</label>
                <div id="city" class="fw-semibold"></div>
            </div>

            <div class="row mb-3">
                <div class="col">
                    <label class="form-label">Latitude</label>
                    <div id="latitude" class="fw-semibold"></div>
                </div>
                <div class="col">
                    <label class="form-label">Longitude</label>
                    <div id="longitude" class="fw-semibold"></div>
                </div>
            </div>

            <!-- State -->
            <div class="mb-3">
                <label class="form-label">State</label>
                <select id="state" name="state" class="form-select">
                    <option>Select One</option>
                </select>
            </div>

            <!-- County -->
            <div class="mb-3">
                <label class="form-label">Select a County</label>
                <select id="county" class="form-select"></select>
            </div>

            <!-- Username -->
            <div class="mb-3">
                <label class="form-label">Desired Username</label>
                <input type="text" id="username" class="form-control">
                <span id="usernameError" class="small"></span>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control">
                <span id="suggestedPwd" class="small text-primary"></span>
            </div>

            <!-- Password Again -->
            <div class="mb-3">
                <label class="form-label">Type Password Again</label>
                <input type="password" id="passwordAgain" class="form-control">
                <span id="passwordError" class="small text-danger"></span>
            </div>

            <!-- Submit -->
            <div class="text-center">
                <input type="submit" value="Sign up!" class="btn btn-primary px-4">
            </div>

        </form>
    </div>
</div>
<footer class="text-center mt-5">
    <hr class="mb-3">
    <p class="text-muted small">
        CST336 Internet Programming, 2026 &copy; Farner |
        <a href="../tfarner86.github.io/index.html" class="text-decoration-none">
            Directory to Taylor's CST336 Projects
        </a>
    </p>
</footer>

<script src="js/script.js" defer></script>
</body>
</html>
